  <meta name="twitter:image" content="https://guillepee.github.io/Personal_page/assets/images/og-image.jpg" />

  <!-- Fuentes: Fraunces (display), Inter Tight (body), JetBrains Mono (mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter+Tight:wght@300..700&family=JetBrains+Mono:wght@400;500&family=UnifrakturMaguntia&family=Press+Start+2P&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/main.css" />

  <!-- Aplica el tema guardado antes de pintar, para evitar parpadeo (FOUC). -->
  <script>
    (function () {
      var saved = localStorage.getItem("theme");
      if (saved) document.documentElement.setAttribute("data-theme", saved);
    })();
  </script>

  <!-- Fase 2: temas, configuración del sitio (sidebar) y contenido desde JSON -->
  <script src="scripts/theme-loader.js" defer></script>
  <script src="scripts/site-config.js" defer></script>
  <script src="scripts/content-renderer.js" defer></script>
</head>
<body>
  <div class="app">
    <!-- ============================================================
         SIDEBAR
         ============================================================ -->
    <aside class="sidebar">
      <!-- Contenedor escalable: theme-loader/JS ajusta --sidebar-scale para
           que todo entre sin scroll en cualquier altura de viewport. -->
      <div class="sidebar__fit">

      <div class="sidebar__brand">

        <div class="sidebar__brand-text">
          <span class="sidebar__brand-name"></span>
          <span class="sidebar__brand-role"></span>
        </div>
      </div>

      <!-- Los botones de idioma los genera site-config.js desde site.json -->
      <div class="sidebar__langs"></div>

      <nav class="sidebar__nav" aria-label="Navegación principal"></nav>

      <div class="sidebar__footer">
        <div class="sidebar__footer-top">
          <span class="sidebar__footer-text">v0.1 · fase 1</span>
          <button class="theme-toggle" type="button" id="themeToggle" aria-label="Cambiar tema">

            </svg>

          </button>
        </div>
        <!-- Los botones de temas especiales los genera theme-loader.js desde theme.json -->

      </div>
      </div>
    </aside>

    <!-- ============================================================

  </div>

  <!--
    Comportamiento de layout que no depende de los JSON: escalado de la
    sidebar (fitSidebar) y scrollspy. Los temas viven en theme-loader.js,
    el sidebar en site-config.js y el contenido en content-renderer.js.
  -->
  <script>
    (function () {
      // Escala el contenido de la sidebar para que entre completo sin scroll.
      // Mide la altura natural (sin que flex la comprima) y la compara con el
      // alto disponible; si no entra, reduce --sidebar-scale proporcionalmente.
      const sidebarEl = document.querySelector(".sidebar");
      const sidebarFit = document.querySelector(".sidebar__fit");
      function fitSidebar() {
        if (!sidebarEl || !sidebarFit) return;
        // Medir sin escalar: scrollHeight del contenedor flex refleja el alto
        // real del contenido (incluido el desborde) tal como se renderiza.
        sidebarFit.style.setProperty("--sidebar-scale", 1);
        const cs = getComputedStyle(sidebarEl);
        const available =
          sidebarEl.clientHeight -
          parseFloat(cs.paddingTop) -
          parseFloat(cs.paddingBottom);
        const natural = sidebarFit.scrollHeight;
        // 1px de margen para evitar desbordes por redondeo subpíxel.
        const scale = natural > available ? (available - 1) / natural : 1;
        sidebarFit.style.setProperty("--sidebar-scale", scale);
      }

      // Recalcular el escalado ante cambios de tamaño, carga de fuentes web,
      // (re)construcción del nav (site-config) o cambio de tema (theme-loader).
      fitSidebar();
      document.fonts.ready.then(fitSidebar);
      window.addEventListener("resize", fitSidebar);
      document.addEventListener("sidebar:rendered", fitSidebar);
      document.addEventListener("theme:changed", () => {
        fitSidebar();
        document.fonts.ready.then(fitSidebar);
      });

      // Scrollspy: marca el nav-link de la sección visible. Los nav-links los
      // genera site-config.js de forma asíncrona, así que se consultan en vivo
      // en cada actualización (no se capturan una sola vez al inicio).
      const sections = Array.from(document.querySelectorAll(".section"));

      const setActive = (id) => {
        document.querySelectorAll(".sidebar__nav .nav-link").forEach((link) => {
          const href = link.getAttribute("href");
          link.classList.toggle("is-active", href === "#" + id);
        });
      };

      const observer = new IntersectionObserver(
        (entries) => {
          const visible = entries
            .filter((e) => e.isIntersecting)
            .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
          if (visible) setActive(visible.target.id);
        },
        { rootMargin: "-30% 0px -60% 0px", threshold: [0, 0.25, 0.5, 0.75, 1] }
      );

      sections.forEach((s) => observer.observe(s));
    })();
  </script>
</body>
</html>
